        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            // Animate fiber/mustache meshes based on mouth movement (Mesh mode)
            if (fiberMeshes.length > 0 && currentRenderMode === 'mesh') {
                let mouthActivity = 0;

                // Check mouth-related morph targets
                morphMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary || {};
                    const influences = mesh.morphTargetInfluences || [];

                    Object.keys(dict).forEach(name => {
                        const lower = name.toLowerCase();
                        if (lower.includes('mouth') || lower.includes('jaw') ||
                            lower.includes('lip') || lower.includes('viseme') ||
                            lower.includes('open') || lower.includes('smile') ||
                            lower.includes('frown') || lower.includes('pucker')) {
                            const value = influences[dict[name]] || 0;
                            mouthActivity = Math.max(mouthActivity, value);
                        }
                    });
                });

                // Animate fiber vertices with smooth, natural movement
                const time = performance.now() * 0.001;

                fiberMeshes.forEach(mesh => {
                    const positions = mesh.geometry.attributes.position;
                    const originalPos = fiberOriginalPositions.get(mesh.uuid);

                    if (originalPos && mouthActivity > 0.01) {
                        for (let i = 0; i < positions.count; i++) {
                            const origX = originalPos[i * 3];
                            const origY = originalPos[i * 3 + 1];
                            const origZ = originalPos[i * 3 + 2];

                            // Smooth, natural wave animation - slower frequencies
                            const wave1 = Math.sin(time * 3 + origX * 20 + i * 0.02) * mouthActivity * 0.012;
                            const wave2 = Math.cos(time * 2.5 + origY * 15) * mouthActivity * 0.008;
                            const wave3 = Math.sin(time * 2 + origZ * 10) * mouthActivity * 0.006;
                            const lift = mouthActivity * 0.015;

                            positions.setXYZ(
                                i,
                                origX + wave1,
                                origY + wave2 + lift,
                                origZ + wave3
                            );
                        }
                        positions.needsUpdate = true;
                    } else if (originalPos && mouthActivity <= 0.01) {
                        // Reset to original positions when not talking
                        positions.array.set(originalPos);
                        positions.needsUpdate = true;
                    }
                });
            }

            // Get mouth activity for mustache animation
            let mouthActivity = 0;
            morphMeshes.forEach(mesh => {
                const dict = mesh.morphTargetDictionary || {};
                const influences = mesh.morphTargetInfluences || [];

                Object.keys(dict).forEach(name => {
                    const lower = name.toLowerCase();
                    if (lower.includes('mouth') || lower.includes('jaw') ||
                        lower.includes('lip') || lower.includes('viseme') ||
                        lower.includes('open') || lower.includes('smile') ||
                        lower.includes('frown') || lower.includes('pucker')) {
                        const value = influences[dict[name]] || 0;
                        mouthActivity = Math.max(mouthActivity, value);
                    }
                });
            });

            // Update point cloud positions based on morph targets
            if (isPointCloudMode) {
                const time = performance.now() * 0.001;

                pointClouds.forEach(pointCloud => {
                    const mesh = pointCloud.userData.originalMesh;
                    const basePositions = pointCloud.userData.basePositions;
                    const morphDeltas = pointCloud.userData.morphDeltas;
                    const vertexCount = pointCloud.userData.vertexCount;

                    if (!mesh || !basePositions) return;

                    const positions = pointCloud.geometry.attributes.position;
                    const meshName = mesh.name.toLowerCase();
                    const isFiber = meshName.includes('fiber') || meshName.includes('moustache') || meshName.includes('mustache');

                    // Calculate new positions
                    for (let i = 0; i < vertexCount; i++) {
                        let x = basePositions[i * 3];
                        let y = basePositions[i * 3 + 1];
                        let z = basePositions[i * 3 + 2];

                        // Add morph target contributions (if available)
                        if (morphDeltas && morphDeltas.length > 0 && mesh.morphTargetInfluences) {
                            for (let m = 0; m < morphDeltas.length; m++) {
                                const influence = mesh.morphTargetInfluences[m] || 0;
                                if (influence > 0.001) {
                                    x += morphDeltas[m][i * 3] * influence;
                                    y += morphDeltas[m][i * 3 + 1] * influence;
                                    z += morphDeltas[m][i * 3 + 2] * influence;
                                }
                            }
                        }

                        // Add mustache shake animation for fiber meshes - smooth and natural
                        if (isFiber && mouthActivity > 0.01) {
                            // Natural wave animation - slightly faster for Points mode
                            const wave1 = Math.sin(time * 5 + x * 25 + i * 0.02) * mouthActivity * 0.015;
                            const wave2 = Math.cos(time * 4 + y * 20) * mouthActivity * 0.010;
                            const wave3 = Math.sin(time * 3.5 + z * 15) * mouthActivity * 0.008;
                            const lift = mouthActivity * 0.015;

                            x += wave1;
                            y += wave2 + lift;
                            z += wave3;
                        }

                        positions.setXYZ(i, x, y, z);
                    }
                    positions.needsUpdate = true;
                });
            }

            // Animate hands with gentle floating motion
            animateHands();

            // Animate hair with natural wind-like movement
            animateHair();

            renderer.render(scene, camera);
        }

            rotateToNextKey() {

                // Try all API keys before giving up
                let lastError = null;
                const startKeyIndex = this.currentKeyIndex;

                do {
                    try {

                        const currentKey = this.getCurrentApiKey();
                        console.log(`🔊 TTS: Trying API key ${this.currentKeyIndex + 1}/${this.apiKeys.length}`);

                        } else {

            async playWithLipSync(audioBlob) {
                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);

                // Create source and connect to analyser
                this.source = this.audioContext.createBufferSource();
                this.source.buffer = audioBuffer;
                this.source.connect(this.analyser);
                this.analyser.connect(this.audioContext.destination);

                this.isPlaying = true;
                this.isSpeaking = true;
                updateVoiceStatus('Speaking...', 'speaking');

                // Start lip sync animation
                this.animateMouth();

                this.source.onended = () => {
                    this.isPlaying = false;
                    this.isSpeaking = false;
                    this.resetMouth();
                    updateVoiceStatus('Click mic to talk');
                };

                this.source.start(0);
            }

            animateMouth() {
                if (!this.isSpeaking) return;

                this.analyser.getByteFrequencyData(this.dataArray);

                // Analyze frequency bands
                const bufferLength = this.analyser.frequencyBinCount;

                // Low frequencies (bass) - jaw movement
                let lowSum = 0;
                for (let i = 0; i < bufferLength * 0.2; i++) {
                    lowSum += this.dataArray[i];
                }
                const lowAvg = lowSum / (bufferLength * 0.2) / 255;

                // Mid frequencies - lip movement
                let midSum = 0;
                for (let i = Math.floor(bufferLength * 0.2); i < bufferLength * 0.6; i++) {
                    midSum += this.dataArray[i];
                }
                const midAvg = midSum / (bufferLength * 0.4) / 255;

                // High frequencies - subtle expressions
                let highSum = 0;
                for (let i = Math.floor(bufferLength * 0.6); i < bufferLength; i++) {
                    highSum += this.dataArray[i];
                }
                const highAvg = highSum / (bufferLength * 0.4) / 255;

                // Overall volume
                const volume = (lowAvg + midAvg + highAvg) / 3;

                // Map to morph targets with smoothing
                const jawValue = Math.min(lowAvg * 1.5, 0.8);
                const mouthOpenValue = Math.min(volume * 1.8, 0.7);
                const puckerValue = Math.min(midAvg * 0.8, 0.4);
                const smileValue = Math.min(highAvg * 0.5, 0.3);

                // Apply to morphs
                if (this.mouthMorphs.jawOpen) {
                    setMorphValue(this.mouthMorphs.jawOpen, jawValue);
                }
                if (this.mouthMorphs.mouthOpen) {
                    setMorphValue(this.mouthMorphs.mouthOpen, mouthOpenValue);
                }
                if (this.mouthMorphs.mouthPucker || this.mouthMorphs.lipPucker) {
                    const morphName = this.mouthMorphs.mouthPucker || this.mouthMorphs.lipPucker;
                    setMorphValue(morphName, puckerValue);
                }
                if (this.mouthMorphs.mouthSmile) {
                    setMorphValue(this.mouthMorphs.mouthSmile, smileValue);
                }

                // Also apply generic mouth morphs for models without specific targets
                morphMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary || {};
                    Object.keys(dict).forEach(name => {
                        const lower = name.toLowerCase();
                        if (lower.includes('mouth') || lower.includes('jaw') || lower.includes('lip')) {
                            const index = dict[name];
                            if (index !== undefined) {
                                // Vary based on morph name
                                let value = mouthOpenValue;
                                if (lower.includes('jaw')) value = jawValue;
                                else if (lower.includes('pucker')) value = puckerValue;
                                else if (lower.includes('smile')) value = smileValue;

                                mesh.morphTargetInfluences[index] = value;
                            }
                        }
                    });
                });

                requestAnimationFrame(() => this.animateMouth());
            }

            resetMouth() {
                // Smoothly reset all mouth morphs to 0
                morphMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary || {};
                    Object.keys(dict).forEach(name => {
                        const lower = name.toLowerCase();
                        if (lower.includes('mouth') || lower.includes('jaw') || lower.includes('lip')) {
                            animateMorph(name, 0, 200);
                        }
                    });
                });
            }

            async streamAIResponse(userInput) {
                try {
                    const response = await fetch('http://localhost:3000/api/chat/stream', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: userInput,
                            conversationId: this.getSessionId()
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Backend error: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullResponse = '';

                    // Add placeholder for doctor's response

                    this.conversationHistory.push({
                        role: 'doctor',
                        content: '',
                        timestamp: new Date()
                    });

                    // Collect the full response first (don't speak yet)
                    while (true) {
                        const { done, value } = await reader.read();

                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);

                                if (data === '[DONE]') {
                                    break;
                                }

                                try {
                                    const parsed = JSON.parse(data);
                                    const content = parsed.choices?.[0]?.delta?.content || '';

                                    if (content) {
                                        fullResponse += content;

                                        // Update conversation display in real-time
                                        this.conversationHistory[doctorMessageIndex].content = fullResponse;
                                        this.updateConversationDisplay();
                                    }
                                } catch (e) {

                    // Now speak the COMPLETE response all at once
                    if (fullResponse.trim()) {
                        await this.voiceManager.speak(fullResponse.trim());
                    }

                } catch (error) {
                    console.error('Streaming error:', error);

                    // Fallback to non-streaming
                    const response = await this.generateAIResponse(userInput);

                    this.conversationHistory.push({
                        role: 'doctor',

                        timestamp: new Date()

                    this.updateConversationDisplay();
                    await this.voiceManager.speak(response);

                return text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0);
            }

            async play() {
                if (this.isPaused) {
                    // Resume from where we paused
                    this.resume();
                    return;
                }

                const textarea = document.getElementById('scriptTextarea');
                this.lines = this.parseScript(textarea.value);

                if (this.lines.length === 0) {
                    this.updateStatus('No script lines to play');
                    return;
                }

                this.delayBetweenLines = parseFloat(document.getElementById('lineDelay').value) || 1.5;
                this.isPlaying = true;
                this.isPaused = false;
                this.currentLineIndex = 0;

                this.updatePlayButton('playing');

                await this.playNextLine();
            }

            resume() {
                this.isPlaying = true;
                this.isPaused = false;
                this.updatePlayButton('playing');
                this.playNextLine();
            }

            pause() {
                this.isPlaying = false;
                this.isPaused = true;
                this.voiceManager.stop();

                this.updatePlayButton('paused');
                this.updateStatus(`Paused at line ${this.currentLineIndex + 1}/${this.lines.length}`);
            }

            async playNextLine() {
                if (!this.isPlaying || this.currentLineIndex >= this.lines.length) {
                    if (this.currentLineIndex >= this.lines.length) {
                        this.complete();
                    }
                    return;
                }

                const line = this.lines[this.currentLineIndex];
                this.updateStatus(`Line ${this.currentLineIndex + 1}/${this.lines.length}: "${line.substring(0, 30)}${line.length > 30 ? '...' : ''}"`);

                // Wait for the voice manager to finish speaking
                await this.speakAndWait(line);

                if (!this.isPlaying) return; // Check if paused during speech

                this.currentLineIndex++;

                if (this.currentLineIndex < this.lines.length && this.isPlaying) {
                    // Wait for delay then play next line
                    this.updateStatus(`Waiting ${this.delayBetweenLines}s before next line...`);
                    await this.delay(this.delayBetweenLines * 1000);

                    if (this.isPlaying) {
                        await this.playNextLine();
                    }
                } else if (this.currentLineIndex >= this.lines.length) {
                    this.complete();
                }
            }

            async speakAndWait(text) {
                return new Promise(async (resolve) => {
                    // Start speaking
                    await this.voiceManager.speak(text);

                    // Wait for speech to complete
                    const checkInterval = setInterval(() => {
                        if (!this.voiceManager.isPlaying && !this.voiceManager.isSpeaking) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                        // Also resolve if paused
                        if (!this.isPlaying) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);

                    // Timeout after 60 seconds max
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        resolve();
                    }, 60000);
                });
            }

            delay(ms) {
                return new Promise(resolve => {
                    const timeout = setTimeout(resolve, ms);

                    // Check every 100ms if we should cancel the delay (if paused)
                    const checkInterval = setInterval(() => {
                        if (!this.isPlaying) {
                            clearTimeout(timeout);
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);

                    // Clear interval when timeout completes
                    setTimeout(() => clearInterval(checkInterval), ms);
                });
            }

            stop() {
                this.isPlaying = false;
                this.isPaused = false;
                this.currentLineIndex = 0; // Reset to beginning
                this.voiceManager.stop();

                this.updatePlayButton('stopped');
                this.updateStatus('Stopped');
            }

            complete() {
                this.isPlaying = false;
                this.isPaused = false;
                this.currentLineIndex = 0; // Reset for next play

                this.updatePlayButton('stopped');
                this.updateStatus('Script completed!');
            }

            updatePlayButton(state) {
                const playBtn = document.getElementById('playScriptBtn');

                if (state === 'playing') {
                    playBtn.classList.add('playing');
                    playBtn.textContent = '⏸ Pause';
                } else if (state === 'paused') {
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶ Resume';
                } else { // stopped or completed
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶ Play Script';
                }
            }

            updateStatus(text) {
                document.getElementById('scriptStatus').textContent = text;
            }
        }

        // Initialize script player
        const scriptPlayer = new ScriptPlayer(voiceManager);

        // Script playback event listeners
        document.getElementById('playScriptBtn').addEventListener('click', () => {
            if (scriptPlayer.isPlaying) {
                scriptPlayer.pause();
            } else {
                scriptPlayer.play();
            }
        });

        document.getElementById('stopScriptBtn').addEventListener('click', () => {
            scriptPlayer.stop();
        });

        // Predefined scripts
        const predefinedScripts = {
            doctorknow: `Hello there. Yes… you. I see you're looking at me, which means the experiment is working.
My name is Doctor Know. I know many things. Some of them are even correct.

If you're wondering what I'm thinking… I'm wondering the same thing about you.`,

            doctor: `Hello, I am Dr. Know, your virtual healthcare assistant.
How are you feeling today?
I'm here to help you with your health concerns.
Let me ask you a few questions about your symptoms.
Have you been experiencing any pain or discomfort?
When did these symptoms first appear?
On a scale of 1 to 10, how would you rate your pain level?

If your symptoms persist, please consult with a healthcare professional.
Is there anything else you'd like to discuss about your health?
Thank you for using our virtual healthcare service.
Take care and have a wonderful day!`,

            greeting: `Welcome to our virtual healthcare platform.
I'm your AI doctor assistant.
I'm here to provide you with medical guidance and support.
Please feel free to ask me any health-related questions.
Your health and wellbeing are my top priority.`,

            checkup: `Let's begin your virtual health checkup.
First, I'll need to ask you some basic questions.
Are you currently taking any medications?
Do you have any known allergies?
Have you experienced any recent changes in your health?
Any family history of medical conditions I should know about?
Based on your responses, I'll provide appropriate recommendations.`,

            symptoms: `I understand you're experiencing some symptoms.
Can you describe what you're feeling in detail?
When did these symptoms first start?

Are there any activities that make them better or worse?
Have you tried any treatments or remedies so far?
I'll help you understand what might be causing these symptoms.`
        };

        // Reset script button
        document.getElementById('resetScriptBtn').addEventListener('click', () => {
            document.getElementById('scriptTextarea').value = predefinedScripts.doctorknow;
            document.getElementById('scriptSelector').value = 'doctorknow';
            scriptPlayer.stop();
            document.getElementById('scriptStatus').textContent = 'Script reset to default';
        });

        // Script selector dropdown
        document.getElementById('scriptSelector').addEventListener('change', (e) => {
            const selectedScript = e.target.value;
            if (predefinedScripts[selectedScript]) {
                document.getElementById('scriptTextarea').value = predefinedScripts[selectedScript];
                scriptPlayer.stop();
                document.getElementById('scriptStatus').textContent = `Loaded: ${e.target.options[e.target.selectedIndex].text}`;
            }
        });

        // Conversation history toggle
        document.getElementById('conversationToggle').addEventListener('click', () => {
            const panel = document.getElementById('conversationPanel');
            panel.classList.toggle('show');
        });

        // Add conversation display update to voice chat manager
        if (voiceChatManager) {
            voiceChatManager.updateConversationDisplay = function () {
                const historyDiv = document.getElementById('conversationHistory');
                if (!historyDiv) return;

                historyDiv.innerHTML = '';

                this.conversationHistory.slice(-6).forEach(message => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `conversation-message ${message.role}`;
                    messageDiv.textContent = message.content;
                    historyDiv.appendChild(messageDiv);
                });

                // Auto-scroll to bottom
                historyDiv.scrollTop = historyDiv.scrollHeight;
            };
        }
    </script>
